        const callAI = async (systemPrompt, messagesOrPrompt, modelConfig, jsonMode = false, userApiKey = "") => {
            const { id: originalModel, apiKey, baseUrl, provider } = modelConfig;
            let finalKey = userApiKey || apiKey;

            if (provider === 'google' || originalModel.startsWith('gemini')) {

                const contents = Array.isArray(messagesOrPrompt) 
                    ? messagesOrPrompt 
                    : [{ role: 'user', parts: [{ text: messagesOrPrompt }] }];

                };

                        body: JSON.stringify(payload)
                    });

                    if (data.error) throw new Error(data.error.message || "Gemini API Error");
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";

                try {

        // --- 核心工具：中英双语混合文本渲染器与 TTS ---
        const renderBilingualText = (text, themeColor = 'indigo') => {
            if (!text) return null;
            const regex = /\[ENG\]([\s\S]*?)\[\/ENG\]/g;
            const parts = [];
            let lastIndex = 0;
            let match;

            while ((match = regex.exec(text)) !== null) {
                if (match.index > lastIndex) {
                    parts.push({ type: 'zh', content: text.substring(lastIndex, match.index).trim() });
                }
                parts.push({ type: 'en', content: match[1].trim() });
                lastIndex = regex.lastIndex;
            }
            if (lastIndex < text.length) {
                const remaining = text.substring(lastIndex).trim();
                if (remaining) parts.push({ type: 'zh', content: remaining });
            }

            if (parts.length === 0 || parts.every(p => p.type === 'zh')) {
                return <span>{text.replace(/\[\/?ENG\]/g, '')}</span>;
            }

            return (
                <div className="space-y-2 mt-1">
                    {parts.map((p, i) => (
                        p.type === 'zh' ? (
                            <div key={i} className="whitespace-pre-wrap">{p.content}</div>
                        ) : (
                            <div key={i} className={`relative p-3 bg-${themeColor}-50/50 rounded-xl text-${themeColor}-900/80 font-serif italic flex items-start gap-3 border border-${themeColor}-100/50 shadow-sm my-2`}>

                housewife: ["街市小贩", "孩子班主任", "熊孩子", "自家那熊孩子", "老公", "老婆"],
                cfa: ["球迷", "球员"],
                quarrel: ["网络喷子", "杠精网友", "催婚亲戚", "多管闲事邻居", "路怒症司机"]
            };
            
            const [storyData, setStoryData] = useState(null);
            const [selectedSentence, setSelectedSentence] = useState(null);
            const [userReason, setUserReason] = useState("");
            const [showHint, setShowHint] = useState(false);
            
            const [chatLog, setChatLog] = useState([]);
            const [replyText, setReplyText] = useState("");
            
            const [chatPhase, setChatPhase] = useState('idle');
            
            const [loadingStory, setLoadingStory] = useState(false);
            const [loadingQuote, setLoadingQuote] = useState("");
            const [errorMsg, setErrorMsg] = useState("");

            const [currentRecordId, setCurrentRecordId] = useState(null);
            const [autoSaveStatus, setAutoSaveStatus] = useState("");
            
            const chatEndRef = useRef(null);
            const currentTheme = THEME_CONFIG[userType] || THEME_CONFIG.worker;
            const themeColorName = currentTheme.primary.split('-')[1] || 'indigo'; 

            useEffect(() => {
                if (chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [chatLog, chatPhase]);

            useEffect(() => {
                setOpponent(opponentsMap[userType][0]);
                setRoleName("");
                setExtraInfo("");
            }, [userType]);

            const getCurrentModelConfig = () => MODELS.find(m => m.id === selectedModelId) || MODELS[0];

            // 根据是否是 JSON 生成阶段动态调整双语指令
            const getBilingualRule = (isJson = false) => {
                if (languageMode !== 'bilingual') return "";
                if (isJson) {
                    return "\n\n【⚠️核心格式强制要求】：用户开启了双语学习模式。你的所有输出必须是严格的中英双语！每写完一段中文，必须**在同一个文本字符串内**紧接着提供对应的英文翻译，并且**绝对要将英文内容包裹在 [ENG] 和 [/ENG] 标签中**。**切勿因为翻译而破坏原有的 JSON 键值对结构或随意换行**！例如：\"这是中文部分。[ENG]This is the English part.[/ENG]\"";
                } else {
                    return "\n\n【⚠️核心格式强制要求】：用户开启了双语学习模式。你的所有回复必须是严格的中英双语格式！请先输出中文，然后紧接着在下一行提供对应的英文翻译，并且**绝对要将英文内容包裹在 [ENG] 和 [/ENG] 标签中**。例如：\n这是中文部分。\n[ENG]This is the English part.[/ENG]";
                }
            };

            const autoSaveToSupabase = async (currentLog) => {
                if (!storyData) return;
                setAutoSaveStatus("saving");

                const payload = {
                    user_type: userType,
                    role_name: roleName,
                    opponent: opponent,
                    difficulty: difficulty,
                    story_data: storyData,
                    chat_log: currentLog,
                };

                try {
                    if (currentRecordId) {
                        await fetch(`${SUPABASE_URL}/rest/v1/training_history?id=eq.${currentRecordId}`, {
                            method: 'PATCH',
                            headers: {
                                'apikey': SUPABASE_KEY,
                                'Authorization': `Bearer ${SUPABASE_KEY}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(payload)
                        });
                    } else {
                        const response = await fetch(`${SUPABASE_URL}/rest/v1/training_history`, {
                            method: 'POST',
                            headers: {
                                'apikey': SUPABASE_KEY,
                                'Authorization': `Bearer ${SUPABASE_KEY}`,
                                'Content-Type': 'application/json',
                                'Prefer': 'return=representation'
                            },
                            body: JSON.stringify(payload)
                        });
                        const data = await response.json();
                        if (data && data.length > 0) {
                            setCurrentRecordId(data[0].id);
                        }
                    }
                    setAutoSaveStatus("success");
                    setTimeout(() => setAutoSaveStatus(""), 3000);
                } catch (error) {
                    console.error("Auto Save Error:", error);
                    setAutoSaveStatus("error");
                }
            };

            const generateTargetedStory = async () => {
                if (!roleName.trim()) {
                    setErrorMsg("请先输入您的具体身份！");
                    return;
                }

                setLoadingStory(true);
                setLoadingQuote(LOADING_QUOTES[Math.floor(Math.random() * LOADING_QUOTES.length)]);
                setErrorMsg("");
                resetInteraction();
                setCurrentRecordId(null); 
                setAppStage('training'); 

                const randomTheme = getRandomTheme(opponent);
                let systemPrompt = `你是一个深谙逻辑学、行为心理学以及当代职场/社会关系潜规则的顶尖中文导师。你需要编写用于训练大众逻辑思维的短小情境题。` + getBilingualRule(true);
                
                let contextDesc = "";
                if (userType === 'worker') contextDesc = `【主角身份】：打工人，职业是“${roleName}”。`;
                else if (userType === 'student') contextDesc = `【主角身份】：学生，年级是“${roleName}”。`;
                else if (userType === 'housewife') contextDesc = `【主角身份】：家庭主妇/全职家长，自述是“${roleName}”。`;
                else if (userType === 'cfa') contextDesc = `【主角身份】：中国足协工作人员，职位是“${roleName}”。`;
                else if (userType === 'quarrel') contextDesc = `【主角身份】：遭遇无理争执或网络暴力的普通人，自述是“${roleName}”。`;
                
                if (extraInfo.trim()) contextDesc += `\n【近期背景/心境】：${extraInfo}`;
                contextDesc += `\n【对话对手】：${opponent}。`;

                let diffDesc = "";
                if (difficulty === 1) diffDesc = "【难度：青铜】逻辑漏洞极其低级、生硬，明显不讲理。";
                else if (difficulty === 2) diffDesc = "【难度：白银】逻辑漏洞隐藏在日常正常的沟通话术中，具有较强迷惑性。";
                else diffDesc = "【难度：王者】逻辑漏洞极其隐蔽！对方的话术要听起来无比合理、滴水不漏，极难一眼看破。";

                let fallacyInstruction = selectedFallacy === "随机 (默认)"
                    ? "请故意在其中的**一句话**里，随机设置一个符合上述难度和情境的逻辑谬误。"
                    : `👉 【强制核心要求】：本故事必须且只能包含【${selectedFallacy}】这一种逻辑谬误，且必须非常典型！ 👈`;

                const userPrompt = `
                    请根据以下设定，编写一段简短的对话或情境（3-5句话）：
                    ${contextDesc}
                    ${diffDesc}
                    核心切入点：【 ${randomTheme} 】
                    ${fallacyInstruction}
                    
                    【⚠️标题要求】：请注意，故事的标题（title）必须是一个自然、普通的场景短文名称，**绝对不能在标题中直接暴露或暗示逻辑谬误的名称**（例如不能取名为《客户的“滑坡”式要求》）。
                    
                    请严格返回以下JSON格式（如果开启双语模式，所有的中英双语内容必须合并在同一个双引号字符串内部，用 [ENG]...[/ENG] 区分）：
                    {
                        "title": "普通的场景标题 [ENG]Normal Scene Title[/ENG]",
                        "content": [
                            "第一句话的内容 [ENG]First sentence[/ENG]",
                            "第二句话的内容 [ENG]Second sentence[/ENG]",
                            "第三句话的内容 [ENG]Third sentence[/ENG]",
                            "第四句话的内容 [ENG]Fourth sentence[/ENG]"
                        ],
                        "flawIndex": 2, // 存在逻辑谬误的句子索引（从0开始）
                        "fallacyName": "谬误的学名 [ENG]Fallacy Name[/ENG]",
                        "explanation": "详细解释为什么这句话犯了这个谬误 [ENG]Explanation[/ENG]"
                    }
                `;

                try {
                    const resultText = await callAI(systemPrompt, userPrompt, getCurrentModelConfig(), true, customApiKey);
                    const newStory = parseSafeJSON(resultText);
                    setStoryData(newStory);
                } catch (error) {
                    console.error("生成故事失败:", error);
                    setErrorMsg(`生成剧本失败 (${getCurrentModelConfig().name})：${error.message}`);
                    setAppStage('home'); 
                } finally {
                    setLoadingStory(false);
                }
            };

            const startChatCritique = async () => {
                if (selectedSentence === null || !userReason.trim()) return;
                setChatPhase('analyzing');

                const addressUserAs = nickname.trim() ? nickname.trim() : "您";
                let systemPrompt = `你是一个深谙逻辑学和沟通技巧的中文导师。你正在辅导用户拆解一段【逻辑陷阱】。\n\n【互动要求】：在回复中，请直接称呼用户为“${addressUserAs}”，语气要像真实的导师一样亲切自然，绝对不要使用第三人称（如“这位用户”）。` + getBilingualRule(false);
                const cleanSentence = storyData.content[selectedSentence].replace(/\[\/?ENG\]/g, ''); 
                
                const apiContextPrompt = `
                    【背景句子】：${cleanSentence}
                    【标准谬误】：${selectedSentence === storyData.flawIndex ? storyData.fallacyName : "此句其实没有明显的逻辑谬误"}
                    【用户的初始拆解理由】：${userReason}
                    
                    请执行任务：【点评拆解】。
                    1. 若选错：委婉指出，并解释为何没毛病。
                    2. 若选对：评价其理由是否切中要害。
                    【注意】：本次回复**仅限进行点评**，绝对不要提供反驳应对示范！示范我们将在后续步骤生成。
                `;

                const initialChatLog = [{ role: 'user', content: userReason, apiContent: apiContextPrompt }];
                setChatLog(initialChatLog);

                try {
                    const apiMessages = initialChatLog.map(msg => ({ role: msg.role, parts: [{ text: msg.apiContent || msg.content }] }));
                    const resultText = await callAI(systemPrompt, apiMessages, getCurrentModelConfig(), false, customApiKey);
                    const finalLog = [...initialChatLog, { role: 'model', content: resultText }];
                    setChatLog(finalLog);
                    setChatPhase('step1_done');
                    autoSaveToSupabase(finalLog);
                } catch (error) {
                    console.error(error);
                    setChatLog([...initialChatLog, { role: 'model', content: `调用失败：${error.message}` }]);
                    setChatPhase('idle');
                }
            };

            const generateHeadOn = async () => {
                setChatPhase('generating_head_on');
                const addressUserAs = nickname.trim() ? nickname.trim() : "您";
                let systemPrompt = `你是一个深谙逻辑学和沟通技巧的中文导师。\n\n【互动要求】：在回复中，请直接称呼用户为“${addressUserAs}”，语气要亲切自然，不要使用第三人称。` + getBilingualRule(false);
                
                const actionPrompt = `太棒了。现在请基于刚才的点评，为用户提供【高明应对示范 1：正面硬刚式】。
要求：四平八稳地指出对方逻辑漏洞，不卑不亢地直接反驳对方，给出具体的话术示范。不要生成其它多余内容。`;

                const updatedLog = [...chatLog, { role: 'user', content: "请给出【正面硬刚式】的反驳示范。", apiContent: actionPrompt }];
                setChatLog(updatedLog);

                try {
                    const apiMessages = updatedLog.map(msg => ({ role: msg.role, parts: [{ text: msg.apiContent || msg.content }] }));
                    const resultText = await callAI(systemPrompt, apiMessages, getCurrentModelConfig(), false, customApiKey);
                    const finalLog = [...updatedLog, { role: 'model', content: resultText }];
                    setChatLog(finalLog);
                    setChatPhase('step2_done');
                    autoSaveToSupabase(finalLog);
                } catch (error) {
                    setChatLog([...updatedLog, { role: 'model', content: `调用失败：${error.message}` }]);
                    setChatPhase('step1_done'); 
                }
            };

            const generateHighEq = async () => {
                setChatPhase('generating_high_eq');
                const addressUserAs = nickname.trim() ? nickname.trim() : "您";
                let systemPrompt = `你是一个深谙逻辑学和沟通技巧的中文导师。\n\n【互动要求】：在回复中，请直接称呼用户为“${addressUserAs}”，语气要亲切自然，不要使用第三人称。` + getBilingualRule(false);
                
                const actionPrompt = `很好。现在请继续提供【高明应对示范 2：高情商回复式】。
要求：展现极高的情商，不卑不亢，既能巧妙化解对方的逻辑陷阱，又能照顾到双方的面子，引导对话走向建设性方向，给出温和但坚定的话术示范。结尾引导用户继续自由发问或探讨。`;

                const updatedLog = [...chatLog, { role: 'user', content: "请再给出【高情商回复式】的反驳示范。", apiContent: actionPrompt }];
                setChatLog(updatedLog);

                try {
                    const apiMessages = updatedLog.map(msg => ({ role: msg.role, parts: [{ text: msg.apiContent || msg.content }] }));
                    const resultText = await callAI(systemPrompt, apiMessages, getCurrentModelConfig(), false, customApiKey);
                    const finalLog = [...updatedLog, { role: 'model', content: resultText }];
                    setChatLog(finalLog);
                    setChatPhase('free_chat');
                    autoSaveToSupabase(finalLog);
                } catch (error) {
                    setChatLog([...updatedLog, { role: 'model', content: `调用失败：${error.message}` }]);
                    setChatPhase('step2_done'); 
                }
            };

            const handleSendReply = async () => {
                if (!replyText.trim() || chatPhase.includes('generating')) return;
                
                // 在底层附加针对多轮对话的强制双语提醒，防止模型在长上下文中遗忘规则
                const newUserApiContent = replyText + (languageMode === 'bilingual' ? "\n\n(系统强制要求：接下来的回复请务必继续保持中英双语格式，英文必须用[ENG]...[/ENG]包裹)" : "");
                
                const newUserMsg = { role: 'user', content: replyText, apiContent: newUserApiContent };
                const updatedLog = [...chatLog, newUserMsg];
                setChatLog(updatedLog);
                setReplyText("");
                setChatPhase('generating_free_chat');

                const addressUserAs = nickname.trim() ? nickname.trim() : "您";
                const systemPrompt = `你是一个深谙逻辑学与沟通技巧的中文导师。像真实的聊天一样回应用户的探讨，必要时提供应对建议。\n\n【互动要求】：在回复中，请直接称呼用户为“${addressUserAs}”，语气要亲切自然，不要使用第三人称。` + getBilingualRule(false);

                try {
                    const apiMessages = updatedLog.map(msg => ({ role: msg.role, parts: [{ text: msg.apiContent || msg.content }] }));
                    const resultText = await callAI(systemPrompt, apiMessages, getCurrentModelConfig(), false, customApiKey);
                    const finalLog = [...updatedLog, { role: 'model', content: resultText }];
                    setChatLog(finalLog);
                    setChatPhase('free_chat');
                    autoSaveToSupabase(finalLog);
                } catch (error) {
                    setChatLog([...updatedLog, { role: 'model', content: `调用失败：${error.message}` }]);
                    setChatPhase('free_chat');
                }
            };

            const resetInteraction = () => {
                setSelectedSentence(null);
                setUserReason("");
                setChatLog([]);
                setShowHint(false);
                setChatPhase('idle');
                setAutoSaveStatus("");
            };

            const backToHome = () => {
                setAppStage('home');
            };

            const renderHome = () => (
                <div className="max-w-4xl mx-auto animate-[fadeIn_0.4s_ease-out]">
                    <div className="text-center mb-10 mt-10">
                        <h1 className="text-4xl font-extrabold text-slate-800 tracking-tight flex items-center justify-center gap-3 mb-4">
                            <span className="text-4xl">🛡️</span> 逻辑防身术
                        </h1>
                        <p className="text-slate-500 text-lg">定制您的专属对线剧本，在实战中提升逻辑素养与英语水平。</p>
                    </div>

                    <div className="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 overflow-hidden">
                        <div className="flex flex-wrap border-b border-slate-100 bg-slate-50">
                            {Object.keys(opponentsMap).map(type => (
                                <button 
                                    key={type}
                                    onClick={() => setUserType(type)}
                                    className={`flex-1 min-w-[120px] py-4 sm:py-5 text-sm sm:text-lg font-bold transition-colors border-b-2 ${userType === type ? THEME_CONFIG[type].tabColor : 'border-transparent text-slate-400 hover:bg-slate-100'}`}
                                >
                                    {type === 'worker' ? '🏢 职场牛马' : type === 'student' ? '🎒 少年的烦恼' : type === 'housewife' ? '👩‍🍳 家庭琐事' : type === 'cfa' ? '⚽ 中国足球' : '🔥 怼王之王'}
                                </button>
                            ))}
                        </div>

                        <div className="p-6 sm:p-8 space-y-8">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">1. 您的身份与称呼</label>
                                <div className="flex flex-col sm:flex-row gap-4">
                                    <input 
                                        type="text" 
                                        placeholder="具体身份（如：新媒体运营、大二学生...）"
                                        className={`w-full sm:w-2/3 border-2 border-slate-200 rounded-xl p-3.5 focus:ring-0 outline-none transition-colors text-slate-700 ${currentTheme.focus}`}
                                        value={roleName}
                                        onChange={(e) => setRoleName(e.target.value)}
                                    />
                                    <input 
                                        type="text" 
                                        placeholder="您的称呼（如：小明，选填）"
                                        className={`w-full sm:w-1/3 border-2 border-slate-200 rounded-xl p-3.5 focus:ring-0 outline-none transition-colors text-slate-700 ${currentTheme.focus}`}
                                        value={nickname}
                                        onChange={(e) => setNickname(e.target.value)}
                                    />
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-3 uppercase tracking-wide">2. 选择你要对线的对象</label>
                                <div className="flex flex-wrap gap-3">
                                    {opponentsMap[userType].map(opt => (
                                        <button
                                            key={opt}
                                            onClick={() => setOpponent(opt)}
                                            className={`px-5 py-2 rounded-full font-medium transition-all ${opponent === opt ? `${currentTheme.primary} text-white shadow-md` : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                        >
                                            {opt}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="pt-4 border-t border-slate-100">
                                <label className="block text-sm font-bold text-slate-700 mb-3 uppercase tracking-wide">3. 选择逻辑谬误类型</label>
                                <select
                                    className={`w-full border-2 border-slate-200 rounded-xl p-3 focus:ring-0 outline-none transition-colors text-slate-700 bg-white cursor-pointer font-medium ${currentTheme.focus}`}
                                    value={selectedFallacy}
                                    onChange={(e) => setSelectedFallacy(e.target.value)}
                                >
                                    {FALLACY_TYPES.map(fallacy => (
                                        <option key={fallacy} value={fallacy}>{fallacy}</option>
                                    ))}
                                </select>
                            </div>

                            <div className="pt-4 border-t border-slate-100">
                                <label className="block text-sm font-bold text-slate-700 mb-3 uppercase tracking-wide">4. 语言模式 (支持发音)</label>
                                <div className="flex flex-col sm:flex-row gap-4 bg-slate-50 p-4 rounded-xl border-2 border-slate-100">
                                    <label className="flex items-center gap-3 cursor-pointer">
                                        <input type="radio" value="zh" checked={languageMode === 'zh'} onChange={()=>setLanguageMode('zh')} className={`w-5 h-5 accent-${themeColorName}-600`}/>
                                        <span className="font-bold text-slate-700">🇨🇳 全中文版</span>
                                    </label>
                                    <label className="flex items-center gap-3 cursor-pointer">
                                        <input type="radio" value="bilingual" checked={languageMode === 'bilingual'} onChange={()=>setLanguageMode('bilingual')} className={`w-5 h-5 accent-${themeColorName}-600`}/>
                                        <span className="font-bold text-slate-700">🌍 中英双语版 <span className="text-xs font-normal text-slate-500">(附带英语朗读功能)</span></span>
                                    </label>
                                </div>
                            </div>

                            <div className="pt-4 border-t border-slate-100">
                                <label className="block text-sm font-bold text-slate-700 mb-3 uppercase tracking-wide">5. 选择 AI 模型及配置</label>
                                <div className="flex flex-col sm:flex-row gap-4">
                                    <select
                                        className={`flex-1 border-2 border-slate-200 rounded-xl p-3 focus:ring-0 outline-none transition-colors text-slate-700 bg-slate-50 cursor-pointer font-medium ${currentTheme.focus}`}
                                        value={selectedModelId}
                                        onChange={(e) => setSelectedModelId(e.target.value)}
                                    >
                                        {MODELS.map(m => (
                                            <option key={m.id} value={m.id}>{m.name}</option>
                                        ))}
                                    </select>
                                    <input 
                                        type="password"
                                        placeholder="输入自定义 API Key (选填)"
                                        className={`flex-1 border-2 border-slate-200 rounded-xl p-3 focus:ring-0 outline-none transition-colors text-slate-700 ${currentTheme.focus}`}
                                        value={customApiKey}
                                        onChange={(e) => setCustomApiKey(e.target.value)}
                                    />
                                </div>
                                {selectedModelId === 'gemini-3-flash-preview' && (
                                    <p className="text-xs text-amber-600 mt-2 font-medium">⚠️ 提示：当前选择的 Google 模型需手动输入 API Key。</p>
                                )}
                            </div>

                            {errorMsg && <div className="text-rose-500 text-sm font-medium text-center">{errorMsg}</div>}
                            
                            <div className="flex flex-col gap-3">
                                <button 
                                    onClick={generateTargetedStory}
                                    className={`w-full py-4 rounded-2xl font-bold text-lg text-white shadow-lg transition-all ${!roleName.trim() ? 'bg-slate-300 cursor-not-allowed' : `${currentTheme.primary} ${currentTheme.hover} ${currentTheme.shadow}`}`}
                                >
                                    进入模拟器，生成新剧本 🚀
                                </button>
                                
                                {storyData && (
                                    <button 
                                        onClick={() => setAppStage('training')}
                                        className="w-full py-4 rounded-2xl font-bold text-lg bg-white border-2 border-slate-200 text-slate-700 hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm"
                                    >
                                        返回上一次对话 🔙
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderTraining = () => {
                if (loadingStory || !storyData) {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-[60vh] animate-[fadeIn_0.3s_ease-out]">
                            <div className="relative w-24 h-24">
                                <div className="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                                <div className={`absolute inset-0 border-4 rounded-full border-t-transparent animate-spin border-slate-700`}></div>
                            </div>
                            <h2 className="mt-8 text-xl font-bold text-slate-700">{loadingQuote}</h2>
                        </div>
                    );
                }

                return (
                    <div className="max-w-6xl mx-auto flex flex-col gap-6 animate-[fadeIn_0.4s_ease-out] mt-6 pb-20">
                        <div className="flex items-center justify-between bg-white px-6 py-4 rounded-2xl shadow-[0_2px_10px_rgb(0,0,0,0.02)] border border-slate-100">
                            <button onClick={backToHome} className="text-slate-400 hover:text-slate-700 font-medium flex items-center gap-2 transition-colors">
                                <span>←</span> 主页
                            </button>
                            <div className="flex items-center gap-4">
                                <div className="hidden lg:flex items-center gap-2">
                                    <span className="text-sm font-bold bg-slate-100 text-slate-600 px-3 py-1 rounded-full">{roleName} vs {opponent}</span>
                                    <span className={`text-sm font-bold px-3 py-1 rounded-full text-white ${difficulty === 1 ? 'bg-green-500' : difficulty === 2 ? 'bg-amber-500' : 'bg-rose-500'}`}>难度 {difficulty}</span>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
                            <div className="bg-white rounded-3xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] border border-slate-100 p-6 sm:p-8 sticky top-6">
                                <div className="flex items-center justify-between mb-6 border-b border-slate-100 pb-4">
                                    <h2 className="text-xl font-bold text-slate-800 flex items-start gap-3">
                                        <span className="text-2xl mt-1">{currentTheme.icon}</span> 
                                        <div className="flex-1">{renderBilingualText(storyData.title, themeColorName)}</div>
                                    </h2>
                                </div>
                                
                                <div className="space-y-4 leading-loose text-[17px] text-slate-700">
                                    {storyData.content.map((sentence, index) => {
                                        const isSelected = selectedSentence === index;
                                        const isHinted = showHint && index === storyData.flawIndex;
                                        return (
                                            <div 
                                                key={index}
                                                onClick={() => { resetInteraction(); setSelectedSentence(index); }}
                                                className={`
                                                    cursor-pointer transition-all duration-200 rounded-xl px-4 py-2 -mx-4
                                                    ${isSelected ? currentTheme.selectedItem : 'hover:bg-slate-100'}
                                                    ${isHinted && !isSelected ? 'border-l-4 border-rose-400 bg-rose-50' : 'border-l-4 border-transparent'}
                                                `}
                                            >
                                                {renderBilingualText(sentence, themeColorName)}
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                <div className="mt-8 pt-4 border-t border-slate-50 flex justify-between items-center">
                                    <button 
                                        onClick={generateTargetedStory}
                                        className={`text-sm font-bold px-4 py-2 rounded-lg transition-colors ${currentTheme.lightBg} ${currentTheme.text} hover:opacity-80`}
                                    >
                                        🔄 换个剧本
                                    </button>
                                    <button 
                                        onClick={() => setShowHint(true)}
                                        className="text-sm font-medium text-slate-400 hover:text-amber-500 flex items-center gap-1 transition-colors"
                                    >
                                        <span className="text-base">💡</span> 求助提示
                                    </button>
                                </div>
                            </div>

                            <div className="flex flex-col gap-6">
                                {selectedSentence === null && (
                                    <div className="bg-slate-100/50 border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center p-12 text-slate-400 h-full min-h-[400px]">
                                        <span className="text-4xl mb-4">🎯</span>
                                        <p>点击左侧文本中</p>
                                        <p>您认为存在“逻辑漏洞”的那句话</p>
                                    </div>
                                )}

                                {selectedSentence !== null && chatPhase === 'idle' && (
                                    <div className="bg-white rounded-3xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] border border-slate-100 p-6 sm:p-8 animate-[fadeIn_0.3s_ease-out]">
                                        <div className={`border-l-4 pl-4 py-2 italic text-slate-700 bg-slate-50 rounded-r-lg mb-6 text-lg ${currentTheme.border}`}>
                                            {renderBilingualText(storyData.content[selectedSentence], themeColorName)}
                                        </div>
                                        
                                        <label className="block font-bold text-slate-800 mb-2 text-lg">
                                            您的拆解与反驳：
                                        </label>
                                        <textarea
                                            className={`w-full border-2 border-slate-200 rounded-2xl p-4 focus:ring-0 outline-none transition-all resize-none text-slate-700 text-base ${currentTheme.focus}`}
                                            rows="4"
                                            placeholder="指出这句话背后的荒谬之处..."
                                            value={userReason}
                                            onChange={(e) => setUserReason(e.target.value)}
                                        ></textarea>
                                        
                                        <div className="mt-5 flex justify-end gap-3">
                                            <button onClick={resetInteraction} className="px-5 py-2.5 text-slate-500 font-medium hover:bg-slate-100 rounded-xl transition-colors">取消</button>
                                            <button 
                                                onClick={startChatCritique}
                                                disabled={!userReason.trim()}
                                                className={`px-6 py-2.5 text-white rounded-xl font-bold transition-all shadow-md disabled:shadow-none flex items-center gap-2 ${currentTheme.primary} ${currentTheme.hover} disabled:opacity-50`}
                                            >
                                                提交拆解分析
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {chatPhase !== 'idle' && (
                                    <div className="bg-white rounded-3xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] border border-slate-100 flex flex-col h-[700px] animate-[fadeIn_0.4s_ease-out]">
                                        <div className={`px-6 py-4 border-b border-slate-100 rounded-t-3xl flex items-center justify-between ${currentTheme.lightBg}`}>
                                            <h3 className="font-bold text-slate-800 flex items-center gap-2">
                                                <span className="text-xl">🎓</span> {getCurrentModelConfig().name} 导师深度探讨室
                                            </h3>
                                            <button onClick={resetInteraction} className="text-xs text-slate-500 hover:text-slate-800 bg-white px-2 py-1 rounded-md border border-slate-200 shadow-sm">
                                                结束探讨
                                            </button>
                                        </div>
                                        
                                        <div className="flex-1 overflow-y-auto p-0 bg-slate-50/30 flex flex-col">
                                            <div className="bg-slate-100 border-b border-slate-200 py-6 px-4 text-center animate-[fadeIn_0.5s_ease-out]">
                                                <p className="text-sm font-bold text-slate-500 mb-2 tracking-widest uppercase">本案核心逻辑谬误</p>
                                                <h2 className={`text-2xl md:text-3xl font-extrabold ${currentTheme.text}`}>
                                                    {renderBilingualText(storyData.fallacyName, themeColorName)}
                                                </h2>
                                            </div>

                                            <div className="p-6 space-y-6">
                                                {chatLog.map((msg, idx) => (
                                                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                        <div className={`max-w-[90%] rounded-2xl px-5 py-4 shadow-sm ${
                                                            msg.role === 'user' 
                                                            ? `${currentTheme.primary} text-white rounded-tr-sm`
                                                            : 'bg-white border border-slate-200 text-slate-700 rounded-tl-sm'
                                                        }`}>
                                                            {msg.role === 'model' && <div className={`text-xs font-bold mb-2 ${currentTheme.text}`}>导师回复</div>}
                                                            {/* 对于用户的输入，如果是第一条且没有[ENG]包裹，就直接渲染；如果是模型回复，调用双语渲染器 */}
                                                            <div className="text-[15px] leading-relaxed">
                                                                {msg.role === 'model' || msg.content.includes('[ENG]') ? renderBilingualText(msg.content, themeColorName) : msg.content}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                                
                                                {/* 步骤提示按钮区域 */}
                                                <div className="flex flex-col items-center gap-3 py-4">
                                                    {chatPhase === 'analyzing' && <div className={`text-sm font-bold flex items-center gap-2 ${currentTheme.text}`}><svg className="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 导师正在点评...</div>}
                                                    {chatPhase === 'generating_head_on' && <div className={`text-sm font-bold flex items-center gap-2 ${currentTheme.text}`}><svg className="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 正在生成“正面硬刚式”示范...</div>}
                                                    {chatPhase === 'generating_high_eq' && <div className={`text-sm font-bold flex items-center gap-2 ${currentTheme.text}`}><svg className="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 正在生成“高情商回复式”示范...</div>}
                                                    {chatPhase === 'generating_free_chat' && <div className={`text-sm font-bold flex items-center gap-2 ${currentTheme.text}`}><svg className="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 导师正在回复...</div>}
                                                    
                                                    {chatPhase === 'step1_done' && (
                                                        <button onClick={generateHeadOn} className={`px-6 py-3 text-white rounded-full font-bold shadow-md transition-all animate-[fadeIn_0.5s_ease-out] ${currentTheme.primary} ${currentTheme.hover}`}>
                                                            ✅ 点评完毕。点击继续生成【正面硬刚式】回怼示范
                                                        </button>
                                                    )}
                                                    {chatPhase === 'step2_done' && (
                                                        <button onClick={generateHighEq} className={`px-6 py-3 text-white rounded-full font-bold shadow-md transition-all animate-[fadeIn_0.5s_ease-out] ${currentTheme.primary} ${currentTheme.hover}`}>
                                                            ✅ 示范一完毕。点击继续生成【高情商回复式】化解冲突示范
                                                        </button>
                                                    )}
                                                </div>
                                                <div ref={chatEndRef} />
                                            </div>
                                        </div>

                                        {chatPhase === 'free_chat' && (
                                            <div className="p-4 bg-white border-t border-slate-100 rounded-b-3xl animate-[fadeIn_0.5s_ease-out]">
                                                <div className="flex gap-2">
                                                    <textarea 
                                                        className={`flex-1 border-2 border-slate-200 rounded-xl p-3 focus:ring-0 outline-none resize-none text-[15px] bg-slate-50 ${currentTheme.focus}`}
                                                        rows="2"
                                                        placeholder="继续自由探讨、提问或追问..."
                                                        value={replyText}
                                                        onChange={(e) => setReplyText(e.target.value)}
                                                        onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendReply(); } }}
                                                    />
                                                    <button 
                                                        onClick={handleSendReply}
                                                        disabled={!replyText.trim()}
                                                        className={`px-6 text-white font-bold rounded-xl transition-colors shadow-sm ${currentTheme.primary} ${currentTheme.hover} disabled:opacity-50`}
                                                    >
                                                        发送
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen font-sans p-4 sm:p-8 overflow-x-hidden relative">
                    {appStage === 'home' ? renderHome() : renderTraining()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
